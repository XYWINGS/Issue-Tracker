name: issue-tracker

services:
  mongodb:
    image: mongo:7
    container_name: issue-tracker-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: issue-tracker
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - issue-tracker-mongo:/data/db

volumes:
  issue-tracker-mongo:
